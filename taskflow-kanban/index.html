<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskFlow – A Trello-style Kanban board for visual task management.">
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-header__brand">
        <span class="app-header__logo" aria-hidden="true"></span>
        <h1 class="app-header__title">TaskFlow</h1>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section class="board" aria-label="Kanban board">
      <article class="column" data-status="todo">
        <header class="column__header">
          <h2 class="column__title">To Do</h2>
        </header>
        <div class="column__cards" aria-label="To Do cards"></div>
        <button class="column__add-btn" type="button" aria-label="Add card to To Do column">
          <span class="column__add-icon" aria-hidden="true">+</span>
          Add card
        </button>
      </article>

      <article class="column" data-status="progress">
        <header class="column__header">
          <h2 class="column__title">In Progress</h2>
        </header>
        <div class="column__cards" aria-label="In Progress cards"></div>
        <button class="column__add-btn" type="button" aria-label="Add card to In Progress column">
          <span class="column__add-icon" aria-hidden="true">+</span>
          Add card
        </button>
      </article>

      <article class="column" data-status="done">
        <header class="column__header">
          <h2 class="column__title">Done</h2>
        </header>
        <div class="column__cards" aria-label="Done cards"></div>
        <button class="column__add-btn" type="button" aria-label="Add card to Done column">
          <span class="column__add-icon" aria-hidden="true">+</span>
          Add card
        </button>
      </article>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
